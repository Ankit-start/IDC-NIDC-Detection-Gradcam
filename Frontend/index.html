<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IDC vs NIDC Detection</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>IDC vs NIDC Detection</h1>
    
    <!-- Upload + Predict controls -->
    <input type="file" id="fileInput" accept="image/*">
    <button id="predictBtn">Predict</button>
    <div id="result"></div>

    <!-- Side-by-side layout -->
    <div class="image-row">
      <!-- Input patch -->
      <div class="image-box">
        <p class="img-label">Input Image</p>
        <img id="uploadedImg" style="display:none;" />
        
      </div>

      <!-- Grad-CAM overlay -->
      <div class="image-box">
        <p class="img-label">Grad-CAM Visualization</p>
        <img id="overlayImg" style="display:none;" />
        
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
